- name: Store latest NAV file in repo
  run: |
    mkdir -p data

    # remove old files
    rm -f data/*

    # rename today's NAV file
    FILE=$(ls nav_*.txt | head -1)
    mv "$FILE" data/latest_nav.txt

    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"

    git add data/
    git commit -m "Update latest NAV file" || true
    git push
