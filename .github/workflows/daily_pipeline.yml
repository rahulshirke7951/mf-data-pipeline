name: MF NAV Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * *"   # 9 PM IST

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch NAV
        run: python scripts/fetch_nav.py

      - name: Update Database
        run: |
          FILE=$(ls nav_*.txt | head -1)
          if [ -z "$FILE" ]; then
            echo "NAV file not found"
            exit 1
          fi
          python scripts/update_db.py "$FILE"

      - name: Verify database
        run: |
          ls -lh
          sqlite3 mf.db ".tables" || true
