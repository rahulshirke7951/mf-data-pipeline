name: MF NAV Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * *"   # 9 PM IST daily

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Setup Python
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------
      # Fetch NAV from AMFI
      # -----------------------------
      - name: Fetch NAV
        run: python scripts/fetch_nav.py

      # -----------------------------
      # Store latest NAV file in repo
      # -----------------------------
      - name: Store latest NAV file in repo
        run: |
          mkdir -p data
          rm -f data/*

          FILE=$(ls nav_*.txt | head -1)
          mv "$FILE" data/latest_nav.txt

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase origin main || true
          git add data/

          # commit only if changes exist
          git diff --staged --quiet || git commit -m "Update latest NAV file"

          git push origin main

      # -----------------------------
      # ⭐ IMPORTANT: Download previous DB (keeps history)
      # -----------------------------
      - name: Download previous database if exists
        run: |
          echo "Checking for previous release DB..."

          URL="https://api.github.com/repos/${{ github.repository }}/releases/latest"

          DOWNLOAD_URL=$(curl -s $URL | jq -r '.assets[]? | select(.name=="mf.db") | .browser_download_url')

          if [ "$DOWNLOAD_URL" != "" ] && [ "$DOWNLOAD_URL" != "null" ]; then
            echo "Downloading previous mf.db..."
            curl -L $DOWNLOAD_URL -o mf.db
          else
            echo "No previous database found — new DB will be created"
          fi

      # -----------------------------
      # Update SQLite database (append NAV history)
      # -----------------------------
      - name: Update Database
        run: python scripts/update_db.py data/latest_nav.txt

      # -----------------------------
      # Generate date variable
      # -----------------------------
      - name: Set date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # -----------------------------
      # Upload database to GitHub Releases
      # -----------------------------
      - name: Create daily release with database
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mf-${{ env.DATE }}
          name: MF Snapshot ${{ env.DATE }}
          files: mf.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # Verify output
      # -----------------------------
      - name: Verify output
        run: ls -lh
