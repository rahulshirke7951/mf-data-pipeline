name: Delete Old Releases

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry mode (true/false)"
        default: "false"
      keep_latest:
        description: "Number of latest releases to keep"
        default: "5"

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Cleanup old releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          KEEP_LATEST: ${{ github.event.inputs.keep_latest || '5' }}
        run: |
          set -e

          echo "Repo: $REPO"
          echo "Dry Run: $DRY_RUN"
          echo "Keep Latest: $KEEP_LATEST"

          NOW=$(date +%s)
          CUTOFF=$((NOW - 30*24*60*60))

          echo "Fetching releases..."

          releases=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases?per_page=100")

          # Sort releases by created_at (newest first)
          sorted=$(echo "$releases" | jq 'sort_by(.created_at) | reverse')

          index=0

          echo "$sorted" | jq -c '.[]' | while read release; do
            id=$(echo "$release" | jq -r '.id')
            tag=$(echo "$release" | jq -r '.tag_name')
            created=$(echo "$release" | jq -r '.created_at')

            created_ts=$(date -d "$created" +%s)

            index=$((index+1))

            # Skip latest N releases
            if [ "$index" -le "$KEEP_LATEST" ]; then
              echo "KEEP (latest): $tag"
              continue
            fi

            # Skip if not older than 30 days
            if [ "$created_ts" -gt "$CUTOFF" ]; then
              echo "KEEP (recent): $tag"
              continue
            fi

            echo "DELETE: $tag"

            if [ "$DRY_RUN" = "false" ]; then
              # Delete release
              curl -s -X DELETE \
                -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/$REPO/releases/$id"

              # Delete tag
              curl -s -X DELETE \
                -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/$REPO/git/refs/tags/$tag"

              echo "Deleted $tag"
            else
              echo "[Dry Run] Would delete $tag"
            fi
          done
